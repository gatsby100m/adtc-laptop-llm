name: Simulate 8GB RAM Environment

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-on-device-llm:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Check System Memory Constraint
      run: |
        echo "=== Checking Available Runner Memory ==="
        free -h
        echo "Note: GitHub hosted runners provide ~7GB of usable RAM, mimicking an 8GB PC constraint."

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Syntax Check App Code
      run: |
        echo "=== Checking Code Syntax ==="
        python -m py_compile app.py
